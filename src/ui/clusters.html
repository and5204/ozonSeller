<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clusters</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, select {
            width: 300px;
            padding: 6px;
        }
    </style>
</head>
<body>

<div class="form-group">
    <label>Регион</label>
    <select id="place">
        <option value="">Select region</option>
        <option value="RUS">Russia</option>
        <option value="SNG">SNG</option>
    </select>
</div>

<div class="form-group">
    <label>Кластер</label>
    <select id="clusters">
        <option value="">Select cluster</option>
    </select>
</div>

<div class="form-group">
    <label>Начальное время</label>
    <input
        type="text"
        id="fromTime"
        placeholder="2026-04-28T12:00:00"
    >
</div>

<div class="form-group">
    <label>Конечное время</label>
    <input
        type="text"
        id="toTime"
        placeholder="2026-04-28T18:00:00"
    >
</div>

<div class="form-group">
    <label>Поиск точки отгрузки</label>
    <input
        type="text"
        id="warehouseSearch"
        placeholder="Введите название точки..."
    >
    <button onclick="">
    искать точку отгрузки
    </button>
</div>

<div class="form-group">
    <label>Точки отгрузки</label>
    <select id="PointsToShipSupplies">
        <option value="">Выберите точку</option>
    </select>
</div>


</div>

<div class="form-group">
    <label>Товар</label>
    <select id="products">
        <option value="">Select product</option>
    </select>
</div>

<div class="form-group">
    <label>Количество товара</label>
    <input
        type="number"
        id="quantity"
        placeholder="Введите количество"
        min="1"
    >
</div>

<div class="form-group">
    <button onclick="createSupplyRequest()">
    Создать заявку на кроссдок
</button>
</div>


<script>


// =========================
// ГЛОБАЛЬНЫЕ ДАННЫЕ
// =========================
let clustersData = [];      // список кластеров
let pointsData = [];        // список точек отгрузки

// Данные заявки
let clustersId = null;
let time_from = null;
let time_to = null;
let warehouse_id = null;
let warehouse_type = null;
let sku = null;
let quantity = null;


// =========================
// ЗАГРУЗКА КЛАСТЕРОВ
// =========================
async function loadClusters() {

    const place = document.getElementById("place").value;
    if (!place) return;

    console.log("[LOAD CLUSTERS] place =", place);

    const response = await fetch(`/api/clusters?place=${place}`);
    const data = await response.json();

    clustersData = data;

    const clusterSelect = document.getElementById("clusters");
    clusterSelect.innerHTML = '<option value="">Select cluster</option>';

    data.forEach(cluster => {

        const option = document.createElement("option");

        option.value = cluster.name;

        // сохраняем ID
        option.dataset.id = cluster.macrolocal_cluster_id;

        option.text = `${cluster.name} (${cluster.type})`;

        clusterSelect.appendChild(option);
    });

    console.log("[CLUSTERS LOADED]", clustersData);
}


// =========================
// ПОИСК И ЗАГРУЗКА ТОЧЕК
// =========================
async function loadPointsToShipSupplies() {

    const search = document.getElementById("warehouseSearch").value;

    if (!search) {
        alert("Введите название точки");
        return;
    }

    console.log("[SEARCH WAREHOUSE]", search);

    const response = await fetch(`/api/warehouses?cluster_name=${encodeURIComponent(search)}`);
    const data = await response.json();

    pointsData = data.PointsToShipSupplies;

    const select = document.getElementById("PointsToShipSupplies");
    select.innerHTML = '<option value="">Выберите точку</option>';

    pointsData.forEach(p => {

        const option = document.createElement("option");

        option.value = p.PointsToShipSupplies_id;

        // сохраняем тип
        option.dataset.type = p.type;

        option.text = `${p.name} (${p.type})`;

        select.appendChild(option);
    });

    console.log("[WAREHOUSES LOADED]", pointsData);
}


// =========================
// ЗАГРУЗКА ТОВАРОВ
// =========================
async function loadProducts() {

    console.log("[LOAD PRODUCTS]");

    const response = await fetch("/api/products");
    const data = await response.json();

    const productSelect = document.getElementById("products");
    productSelect.innerHTML = '<option value="">Select product</option>';

    if (!data.products) return;

    data.products.forEach(p => {

        const option = document.createElement("option");

        option.value = p.sku;
        option.text = `Offer: ${p.offer_id} | SKU: ${p.sku}`;

        productSelect.appendChild(option);
    });

    console.log("[PRODUCTS LOADED]", data.products);
}


// =========================
// СБОР ДАННЫХ ФОРМЫ
// =========================
function collectFormData() {

    console.log("[COLLECT FORM DATA]");

    // === КЛАСТЕР ===
    const clusterSelect = document.getElementById("clusters");
    const selectedCluster = clusterSelect.options[clusterSelect.selectedIndex];

    clustersId = selectedCluster ? Number(selectedCluster.dataset.id) : null;

    // === ВРЕМЯ ===
    time_from = document.getElementById("fromTime").value;
    time_to = document.getElementById("toTime").value;

    // === ТОЧКА ОТГРУЗКИ ===
    const warehouseSelect = document.getElementById("PointsToShipSupplies");
    const selectedWarehouse = warehouseSelect.options[warehouseSelect.selectedIndex];

    warehouse_id = selectedWarehouse ? Number(selectedWarehouse.value) : null;
    warehouse_type = selectedWarehouse?.dataset?.type || null;

    // === SKU ===
    sku = document.getElementById("products").value;

    // === КОЛИЧЕСТВО ===
    quantity = document.getElementById("quantity").value;

    console.log("[FORM DATA]", {
        clustersId,
        time_from,
        time_to,
        warehouse_id,
        warehouse_type,
        sku,
        quantity
    });
}


// =========================
// ВАЛИДАЦИЯ
// =========================
function validateForm() {

    if (!clustersId) return "Не выбран кластер";
    if (!time_from) return "Не указано начальное время";
    if (!time_to) return "Не указано конечное время";
    if (!warehouse_id) return "Не выбрана точка отгрузки";
    if (!sku) return "Не выбран товар";
    if (!quantity || quantity <= 0) return "Некорректное количество";

    return null;
}


// =========================
// СОЗДАНИЕ ЗАЯВКИ
// =========================
async function createSupplyRequest() {

    console.log("========== CREATE SUPPLY ==========");

    collectFormData();

    const error = validateForm();

    if (error) {
        console.warn("[VALIDATION ERROR]", error);
        alert(error);
        return;
    }

    const payload = {
        cluster_id: clustersId,
        warehouse_id: warehouse_id,
        warehouse_type: warehouse_type,
        sku: sku,
        quantity: Number(quantity),
        from_time: time_from,
        to_time: time_to
    };

    console.log("[REQUEST PAYLOAD]", payload);

    try {

        const response = await fetch("/api/create-supply", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        console.log("[SERVER RESPONSE]", result);

        if (result.success) {
            alert("Заявка успешно создана");
        } else {
            alert("Ошибка: " + JSON.stringify(result));
        }

    } catch (e) {
        console.error("[REQUEST ERROR]", e);
        alert("Ошибка запроса");
    }
}


// =========================
// СОБЫТИЯ
// =========================
document.addEventListener("DOMContentLoaded", () => {

    console.log("[INIT] page loaded");

    // регион → кластеры
    document.getElementById("place")
        .addEventListener("change", loadClusters);

    // кнопка поиска точек
    document.querySelector("button[onclick='']")
        .addEventListener("click", loadPointsToShipSupplies);

    // лог выбора SKU
    document.getElementById("products")
        .addEventListener("change", (e) => {
            console.log("[SKU SELECTED]", e.target.value);
        });

    loadProducts();
});


</script>




</body>
</html>
